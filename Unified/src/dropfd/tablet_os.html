<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>防跌监护平板系统</title>
    <link rel="stylesheet" href="tablet_styles.css">
</head>
<body>
    <!-- 主容器 -->
    <div id="tablet-app">
        <!-- 桌面壁纸 -->
        <div id="desktop" class="desktop">
            <div class="desktop-wallpaper"></div>
            
            <!-- 桌面图标网格 -->
            <div class="desktop-icons">
                <div class="desktop-icon" data-app="wechat">
                    <div class="icon-image">
                        <svg viewBox="0 0 48 48" fill="none">
                            <path d="M17 15c-4.4 0-8 2.9-8 6.5 0 2.1 1.1 4 3 5.2l-1 3.8 4.2-2.1c1.2.3 2.5.5 3.8.5 4.4 0 8-2.9 8-6.5S21.4 15 17 15z" stroke="currentColor" stroke-width="2"/>
                            <circle cx="14.5" cy="22" r="1.5" fill="currentColor"/>
                            <circle cx="19.5" cy="22" r="1.5" fill="currentColor"/>
                            <path d="M31 20c-5.5 0-10 3.6-10 8s4.5 8 10 8c1.5 0 3-.3 4.3-.7l5.2 2.6-1.2-4.7c2.4-1.5 3.7-3.8 3.7-6.2 0-4.4-4.5-8-10-8z" stroke="currentColor" stroke-width="2"/>
                            <circle cx="28" cy="29" r="1.5" fill="currentColor"/>
                            <circle cx="34" cy="29" r="1.5" fill="currentColor"/>
                        </svg>
                    </div>
                    <div class="icon-label">某信</div>
                </div>
                
                <div class="desktop-icon" data-app="qq">
                    <div class="icon-image">
                        <svg viewBox="0 0 48 48" fill="none">
                            <ellipse cx="24" cy="20" rx="8" ry="10" stroke="currentColor" stroke-width="2"/>
                            <path d="M16 26c-2 0-4 1.5-4 3.5 0 1.5 1 2.5 2 3-0.5 1.5-1 3-1 4.5 0 2.5 2 4 5 4h8c3 0 5-1.5 5-4 0-1.5-0.5-3-1-4.5 1-0.5 2-1.5 2-3 0-2-2-3.5-4-3.5" stroke="currentColor" stroke-width="2"/>
                            <circle cx="20" cy="22" r="1.5" fill="currentColor"/>
                            <circle cx="28" cy="22" r="1.5" fill="currentColor"/>
                        </svg>
                    </div>
                    <div class="icon-label">某鹅</div>
                </div>
                
                <div class="desktop-icon" data-app="dingtalk">
                    <div class="icon-image">
                        <svg viewBox="0 0 48 48" fill="none">
                            <path d="M24 10L14 16v6l10 7 10-7v-6L24 10z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                            <path d="M14 22l10 7 10-7M24 29v6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <rect x="20" y="35" width="8" height="3" rx="1" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </div>
                    <div class="icon-label">某钉</div>
                </div>
                
                <div class="desktop-icon" data-app="wework">
                    <div class="icon-image">
                        <svg viewBox="0 0 48 48" fill="none">
                            <rect x="12" y="14" width="10" height="10" rx="2" stroke="currentColor" stroke-width="2"/>
                            <rect x="26" y="14" width="10" height="10" rx="2" stroke="currentColor" stroke-width="2"/>
                            <rect x="12" y="28" width="10" height="6" rx="1" stroke="currentColor" stroke-width="2"/>
                            <rect x="26" y="28" width="10" height="6" rx="1" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </div>
                    <div class="icon-label">企业某信</div>
                </div>
                
                <div class="desktop-icon" data-app="browser">
                    <div class="icon-image">
                        <svg viewBox="0 0 48 48" fill="none">
                            <circle cx="24" cy="24" r="14" stroke="currentColor" stroke-width="2"/>
                            <path d="M24 10v28M10 24h28" stroke="currentColor" stroke-width="2"/>
                            <path d="M15 15c3 3 6 9 9 9s6-6 9-9M15 33c3-3 6-9 9-9s6 6 9 9" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </div>
                    <div class="icon-label">浏览器</div>
                </div>
                
                <div class="desktop-icon" data-app="video">
                    <div class="icon-image">
                        <svg viewBox="0 0 48 48" fill="none">
                            <rect x="8" y="16" width="24" height="16" rx="2" stroke="currentColor" stroke-width="2"/>
                            <path d="M32 22l8-4v12l-8-4z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <div class="icon-label">视频通话</div>
                </div>
                
                <div class="desktop-icon" data-app="health">
                    <div class="icon-image">
                        <svg viewBox="0 0 48 48" fill="none">
                            <path d="M24 38l-12-12c-3-3-3-8 0-11s8-3 11 0l1 1 1-1c3-3 8-3 11 0s3 8 0 11l-12 12z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <div class="icon-label">健康档案</div>
                </div>
                
                <div class="desktop-icon" data-app="settings">
                    <div class="icon-image">
                        <svg viewBox="0 0 48 48" fill="none">
                            <circle cx="24" cy="24" r="3" stroke="currentColor" stroke-width="2"/>
                            <path d="M24 14v-4M24 38v-4M34 24h4M10 24h4M31.5 16.5l2.8-2.8M13.7 34.3l2.8-2.8M31.5 31.5l2.8 2.8M13.7 13.7l2.8 2.8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <div class="icon-label">系统设置</div>
                </div>
            </div>
        </div>

        <!-- 全屏应用容器 -->
        <div id="app-container" class="app-container hidden">
            <!-- 应用窗口会动态插入这里 -->
        </div>

        <!-- 来电界面 -->
        <div id="call-screen" class="call-screen hidden">
            <div class="call-background"></div>
            <div class="call-content">
                <div class="call-header">
                    <div class="caller-name">康养社区</div>
                    <div class="call-status" id="call-status-text">来电</div>
                </div>
                
                <div class="call-info">
                    <div class="caller-avatar">
                        <svg viewBox="0 0 64 64" fill="none">
                            <circle cx="32" cy="32" r="30" fill="rgba(255,255,255,0.2)"/>
                            <path d="M32 32c5.5 0 10-4.5 10-10s-4.5-10-10-10-10 4.5-10 10 4.5 10 10 10zM32 36c-8 0-16 4-16 8v4h32v-4c0-4-8-8-16-8z" fill="white"/>
                        </svg>
                    </div>
                </div>
                
                <div class="call-duration hidden" id="call-duration">00:00</div>
                
                <div class="call-actions" id="call-actions">
                    <button class="call-btn call-btn-reject" id="btn-reject">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08c-.18-.17-.29-.42-.29-.7 0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.11-.7-.28-.79-.74-1.68-1.36-2.66-1.85-.33-.16-.56-.5-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z" fill="white" transform="rotate(135 12 12)"/>
                        </svg>
                        <span>拒接</span>
                    </button>
                    
                    <button class="call-btn call-btn-answer" id="btn-answer">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56-.35-.12-.74-.03-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z" fill="white"/>
                        </svg>
                        <span>接听</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Dock 栏 -->
        <div id="dock" class="dock">
            <div class="dock-container">
                <div class="dock-apps">
                    <button class="dock-app" data-app="monitor" title="实时监控">
                        <svg viewBox="0 0 48 48" fill="none">
                            <rect x="8" y="10" width="32" height="22" rx="2" stroke="currentColor" stroke-width="2.5"/>
                            <path d="M16 38h16M24 32v6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                        </svg>
                        <div class="dock-indicator"></div>
                    </button>
                    
                    <button class="dock-app" data-app="history" title="警报历史">
                        <svg viewBox="0 0 48 48" fill="none">
                            <circle cx="24" cy="24" r="14" stroke="currentColor" stroke-width="2.5"/>
                            <path d="M24 16v8l5 5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                        </svg>
                        <div class="dock-indicator"></div>
                    </button>
                    
                    <div class="dock-divider"></div>
                    
                    <button class="dock-app" data-app="settings" title="系统设置">
                        <svg viewBox="0 0 48 48" fill="none">
                            <circle cx="24" cy="24" r="3" stroke="currentColor" stroke-width="2.5"/>
                            <path d="M24 14v-4M24 38v-4M34 24h4M10 24h4M31.5 16.5l2.8-2.8M13.7 34.3l2.8-2.8M31.5 31.5l2.8 2.8M13.7 13.7l2.8 2.8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                        </svg>
                        <div class="dock-indicator"></div>
                    </button>
                    
                    <button class="dock-app" data-app="help" title="帮助中心">
                        <svg viewBox="0 0 48 48" fill="none">
                            <circle cx="24" cy="24" r="14" stroke="currentColor" stroke-width="2.5"/>
                            <path d="M20 20c0-2.2 1.8-4 4-4s4 1.8 4 4c0 2-1.5 3-3 4v2" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                            <circle cx="24" cy="32" r="1.5" fill="currentColor"/>
                        </svg>
                        <div class="dock-indicator"></div>
                    </button>
                </div>
                
                <div class="dock-status">
                    <div class="status-time" id="status-time">12:00</div>
                    <div class="status-icons">
                        <button class="status-icon fullscreen-btn" id="fullscreen-btn" title="全屏">
                            <svg viewBox="0 0 24 24" fill="none">
                                <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                        <svg class="status-icon" viewBox="0 0 24 24" fill="none">
                            <path d="M1 9l2 2 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <path d="M12 5c3.9 0 7 3.1 7 7s-3.1 7-7 7-7-3.1-7-7" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 隐藏的音频元素 -->
    <audio id="alarm-audio" style="display: none;">
        <source src="aviation-alarm.mp3" type="audio/mpeg">
    </audio>
    
    <!-- 来电铃声 -->
    <audio id="ringtone-audio" style="display: none;">
        <source src="laidian.mp3" type="audio/mpeg">
    </audio>

    <script src="tablet_app.js"></script>
</body>
</html>
